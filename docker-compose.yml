version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: venice-bot-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - venice-bot

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venice-bot-app
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - VENICE_API_KEY=${VENICE_API_KEY}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - venice-bot
    restart: unless-stopped

volumes:
  redis-data:

networks:
  venice-bot:
    driver: bridge
